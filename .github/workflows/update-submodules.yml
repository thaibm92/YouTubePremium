name: Update Submodules

on:
  workflow_dispatch:

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.6

      - name: Set up Git
        run: |
           git config --global user.email "actions@github.com"
           git config --global user.name "GitHub Actions"
           
      - name: Thêm Tweaks/YouPiP (nếu cần)
        run: |
          if [ ! -d Tweaks/YouPiP ]; then  # Kiểm tra xem thư mục đã tồn tại
            git submodule add Tweaks/YouPiP https://github.com/PoomSmart/YouPiP.git
          fi
          
      - name: Update submodules
        run: |
         
          git submodule update --init --recursive --remote Tweaks/YouPiP
          git add Tweaks/YouPiP
          
          git submodule update --init --recursive
          git commit -m "updated submodules"
          git push
        continue-on-error: true

      - name: Check exit code
        run: |
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "Submodule update failed with exit code $exit_code"
            exit 1
          fi
